<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BePickleballer Admin</title>
<script>
  if (localStorage.getItem('bp_admin_creds')) {
    document.documentElement.classList.add('bp-has-creds');
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        colors: {
          brand: {
            50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6',
            600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af',
          }
        }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
  html:not(.bp-has-creds) #bp-admin-screen { display: none; }
  html.bp-has-creds #bp-login-screen { display: none; }

  .ql-toolbar.ql-snow {
    border-radius: 0.5rem 0.5rem 0 0;
    border-color: #e5e7eb;
    background: #fafafa;
  }
  .ql-container.ql-snow {
    border-radius: 0 0 0.5rem 0.5rem;
    border-color: #e5e7eb;
    flex: 1 1 auto;
    min-height: 320px;
    overflow-y: auto;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
  }
  .ql-editor { min-height: 100%; }
  .ql-editor::before { font-style: normal !important; color: #94a3b8 !important; }
  .bp-editor-wrap { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; }

  .bp-toast {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
    visibility: hidden;
  }
  .bp-toast.show {
    opacity: 1;
    transform: translateY(0);
    visibility: visible;
  }
</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen antialiased">

<!-- Login Screen -->
<div id="bp-login-screen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-brand-50 via-white to-indigo-50">
  <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8 w-full max-w-md">
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-brand-100 rounded-full mb-4">
        <svg class="w-7 h-7 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm0 0c0 1.657 1.007 3 2.25 3S21 13.657 21 12a9 9 0 1 0-2.636 6.364M16.5 12V8.25"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">BePickleballer Admin</h1>
      <p class="text-sm text-slate-500 mt-1">Sign in to manage your newsletter</p>
    </div>

    <div id="bp-login-error" class="text-red-600 text-sm mb-3 min-h-[20px] font-medium"></div>

    <div class="space-y-4">
      <div>
        <label for="bp-username" class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
        <input type="text" id="bp-username" autocomplete="username" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition">
      </div>
      <div>
        <label for="bp-password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
        <input type="password" id="bp-password" autocomplete="current-password" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition">
      </div>
      <button type="button" id="bp-login-btn" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-lg transition shadow-sm hover:shadow flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
        <span>Log in</span>
      </button>
    </div>
  </div>
</div>

<!-- Admin Screen -->
<div id="bp-admin-screen" class="min-h-screen">
  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h1 class="text-lg font-bold text-slate-900">BePickleballer Admin</h1>
      </div>
      <div class="flex items-center gap-3">
        <a href="#" id="bp-emails-link" class="text-sm font-semibold text-slate-700 hover:text-brand-600 px-3 py-1.5 rounded-lg hover:bg-slate-50 transition">Emails</a>
        <button id="bp-logout-btn" class="text-sm font-semibold text-slate-700 hover:text-red-600 px-3 py-1.5 border border-slate-200 rounded-lg hover:border-red-200 hover:bg-red-50 transition">Logout</button>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

      <!-- Left column: Subscribers -->
      <div class="space-y-6 lg:col-span-2">
        <!-- Add New Subscriber -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
          <h2 class="text-base font-bold text-slate-900 mb-4 flex items-center gap-2">
            Add New Subscriber
          </h2>
          <input type="email" id="bp-new-email" placeholder="new@example.com" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition mb-3">
          <div class="flex gap-2 flex-wrap">
            <button type="button" id="bp-add-btn" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2 px-4 rounded-lg text-sm transition shadow-sm hover:shadow flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
              <span>Add Subscriber</span>
            </button>
            <label for="bp-csv-input" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-lg text-sm font-semibold text-slate-700 cursor-pointer transition flex items-center gap-1.5 whitespace-nowrap">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
              Import CSV
            </label>
            <input type="file" id="bp-csv-input" class="hidden" accept=".csv,text/csv">
          </div>
        </section>

        <!-- Subscriber List -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
          <h2 class="text-base font-bold text-slate-900 mb-3 flex items-center justify-between">
            <span class="flex items-center gap-2">
              Subscriber List
            </span>
            <span class="text-slate-500 font-medium text-sm" id="bp-sub-count">(0)</span>
          </h2>
          <div class="relative mb-3">
            <svg class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="bp-search" placeholder="Search by email..." class="w-full pl-9 pr-9 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition">
            <button type="button" id="bp-search-clear" class="hidden absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 w-6 h-6 rounded-md hover:bg-slate-100 flex items-center justify-center transition" title="Clear">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="border border-slate-200 rounded-lg overflow-hidden">
            <div class="grid grid-cols-[1fr_110px_40px] gap-2 px-4 py-2.5 bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-wider">
              <div>Email</div>
              <div>Date Added</div>
              <div></div>
            </div>
            <div id="bp-sub-list" class="max-h-[378px] overflow-y-auto divide-y divide-slate-100"></div>
            <div id="bp-pagination" class="hidden items-center justify-between border-t border-slate-200 px-4 py-3 text-xs">
              <div class="text-slate-500">
                Showing <span class="font-semibold text-slate-700" id="bp-page-range">0</span> of <span class="font-semibold text-slate-700" id="bp-page-total">0</span>
              </div>
              <div class="flex items-center gap-2">
                <button type="button" id="bp-prev-btn" class="px-2.5 py-1.5 border border-slate-200 rounded-md hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition flex items-center gap-1">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                  Prev
                </button>
                <span class="text-slate-500" id="bp-page-info">Page 1 of 1</span>
                <button type="button" id="bp-next-btn" class="px-2.5 py-1.5 border border-slate-200 rounded-md hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition flex items-center gap-1">
                  Next
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                </button>
              </div>
            </div>
          </div>
        </section>
      </div>

      <!-- Right column: Compose -->
      <div class="lg:col-span-3 flex lg:h-[calc(100vh-131px)] lg:sticky lg:top-24">
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col w-full h-full">
          <h2 class="text-base font-bold text-slate-900 mb-4 flex items-center gap-2">
            Send Email to Subscribers
          </h2>
          <div class="mb-4">
            <label for="bp-subject" class="block text-sm font-semibold text-slate-700 mb-1.5">Subject</label>
            <input type="text" id="bp-subject" placeholder="Your subject line" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition">
          </div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Body</label>
          <div class="bp-editor-wrap">
            <div id="bp-editor"></div>
          </div>
          <div class="flex items-center gap-4 mt-6">
            <button type="button" id="bp-send-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-2.5 rounded-lg transition shadow-sm hover:shadow flex items-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
              <span>Send Newsletter</span>
            </button>
            <span id="bp-send-status" class="text-sm text-slate-500"></span>
          </div>
        </section>
      </div>
    </div>
  </main>
</div>

<!-- Toast -->
<div id="bp-toast" class="bp-toast fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-lg shadow-xl text-sm pointer-events-none z-50 flex items-center gap-2">
  <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
  <span id="bp-toast-body"></span>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
(function(){
  var BACKEND_URL = "https://script.google.com/macros/s/AKfycbz6R0VAaTHsdqXZmx87wJCLhQrwYfLVW42QGaH4FMKu-wdz50MnPdD-R6ZIE-SK6KdJ/exec";
  var creds = null;
  var quill;

  var loginScreen = document.getElementById('bp-login-screen');
  var adminScreen = document.getElementById('bp-admin-screen');
  var loginBtn = document.getElementById('bp-login-btn');
  var logoutBtn = document.getElementById('bp-logout-btn');
  var loginError = document.getElementById('bp-login-error');
  var usernameInput = document.getElementById('bp-username');
  var passwordInput = document.getElementById('bp-password');
  var addBtn = document.getElementById('bp-add-btn');
  var newEmailInput = document.getElementById('bp-new-email');
  var csvInput = document.getElementById('bp-csv-input');
  var subCount = document.getElementById('bp-sub-count');
  var subList = document.getElementById('bp-sub-list');
  var pagination = document.getElementById('bp-pagination');
  var pageRangeEl = document.getElementById('bp-page-range');
  var pageTotalEl = document.getElementById('bp-page-total');
  var pageInfoEl = document.getElementById('bp-page-info');
  var prevBtn = document.getElementById('bp-prev-btn');
  var nextBtn = document.getElementById('bp-next-btn');
  var currentPage = 1;
  var PAGE_SIZE = 20;
  var searchTerm = '';
  var searchInput = document.getElementById('bp-search');
  var searchClearBtn = document.getElementById('bp-search-clear');
  var searchDebounce;
  var subjectInput = document.getElementById('bp-subject');
  var sendBtn = document.getElementById('bp-send-btn');
  var sendStatus = document.getElementById('bp-send-status');
  var toastEl = document.getElementById('bp-toast');
  var toastBody = document.getElementById('bp-toast-body');
  var toastTimeout;

  function showToast(msg) {
    toastBody.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(function(){ toastEl.classList.remove('show'); }, 2500);
  }

  var spinnerSvg = '<span class="inline-block w-4 h-4 rounded-full border-2 border-current/30 border-t-current animate-spin"></span>';

  function api(action, extra) {
    var payload = Object.assign({ action: action }, creds || {}, extra || {});
    return fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    }).then(function(r){ return r.json(); });
  }

  function showAdmin() {
    document.documentElement.classList.add('bp-has-creds');
    initEditor();
    loadSubscribers();
  }

  function showLogin() {
    document.documentElement.classList.remove('bp-has-creds');
  }

  function initEditor() {
    if (quill) return;
    quill = new Quill('#bp-editor', {
      theme: 'snow',
      placeholder: 'Write your newsletter here...',
      modules: {
        toolbar: {
          container: [
            [{ 'header': [1, 2, 3, false] }],
            ['bold', 'italic', 'underline', 'link'],
            [{ 'list': 'ordered' }, { 'list': 'bullet' }],
            ['image'],
            ['clean']
          ],
          handlers: {
            image: function(){
              var url = prompt('Paste the image URL:');
              if (!url) return;
              url = url.trim();
              if (!/^https?:\/\//i.test(url)) {
                showToast('URL must start with http or https');
                return;
              }
              var range = this.quill.getSelection(true);
              this.quill.insertEmbed(range.index, 'image', url);
              this.quill.setSelection(range.index + 1);
            }
          }
        }
      }
    });
  }

  function loadSubscribers() {
    subCount.textContent = '(...)';
    subList.innerHTML = '<div class="flex flex-col items-center justify-center gap-3 py-10 text-sm text-slate-500"><div class="w-8 h-8 rounded-full border-[3px] border-brand-100 border-t-brand-600 animate-spin"></div><span class="font-medium">Loading subscribers...</span></div>';
    pagination.classList.add('hidden');
    pagination.classList.remove('flex');
    api('list_subscribers', { page: currentPage, pageSize: PAGE_SIZE, search: searchTerm }).then(function(res){
      if (!res.success) {
        subCount.textContent = '(Failed)';
        subList.innerHTML = '<div class="px-4 py-8 text-center text-sm text-red-500">Failed to load subscribers</div>';
        return;
      }
      var subs = res.subscribers || [];
      var total = (typeof res.total === 'number') ? res.total : subs.length;
      var totalPages = res.totalPages || Math.max(1, Math.ceil(total / PAGE_SIZE));
      currentPage = res.page || currentPage;
      subCount.textContent = '(' + total + ')';
      subList.innerHTML = '';
      if (total === 0) {
        var emptyMsg = searchTerm
          ? 'No subscribers match "' + searchTerm + '"'
          : 'No subscribers yet';
        subList.innerHTML = '<div class="px-4 py-8 text-center text-sm text-slate-400">' + emptyMsg + '</div>';
        return;
      }
      if (total > PAGE_SIZE) {
        pagination.classList.remove('hidden');
        pagination.classList.add('flex');
        var startIdx = (currentPage - 1) * PAGE_SIZE + 1;
        var endIdx = Math.min(startIdx + subs.length - 1, total);
        pageRangeEl.textContent = startIdx + '-' + endIdx;
        pageTotalEl.textContent = total;
        pageInfoEl.textContent = 'Page ' + currentPage + ' of ' + totalPages;
        prevBtn.disabled = currentPage <= 1;
        nextBtn.disabled = currentPage >= totalPages;
      }
      subs.forEach(function(s, idx){
        var row = document.createElement('div');
        row.className = 'grid grid-cols-[1fr_110px_40px] gap-2 px-4 py-2.5 items-center text-sm hover:bg-slate-50 transition';
        var date = s.timestamp ? new Date(s.timestamp).toLocaleDateString() : '';
        var emailDiv = document.createElement('div');
        emailDiv.className = 'truncate text-slate-900 font-medium text-xs';
        emailDiv.textContent = s.email;
        var dateDiv = document.createElement('div');
        dateDiv.className = 'text-xs text-slate-500';
        dateDiv.textContent = date;
        var btn = document.createElement('button');
        btn.className = 'text-red-500 hover:text-red-700 hover:bg-red-50 rounded-md w-7 h-7 flex items-center justify-center transition justify-self-end';
        btn.title = 'Delete';
        btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/></svg>';
        btn.addEventListener('click', function(){
          if (!confirm('Delete ' + s.email + '?')) return;
          btn.disabled = true;
          btn.innerHTML = spinnerSvg;
          api('delete_subscriber', { email: s.email }).then(function(r){
            if (r.success) { showToast('Subscriber deleted'); loadSubscribers(); }
            else { showToast(r.error || 'Delete failed'); btn.disabled = false; btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/></svg>'; }
          }).catch(function(){
            showToast('Delete failed');
            btn.disabled = false;
            btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/></svg>';
          });
        });
        row.appendChild(emailDiv);
        row.appendChild(dateDiv);
        row.appendChild(btn);
        subList.appendChild(row);
      });
    });
  }

  function withSpinner(btn, label, fn) {
    var orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = spinnerSvg + '<span>' + (label || 'Working...') + '</span>';
    return fn().finally(function(){
      btn.disabled = false;
      btn.innerHTML = orig;
    });
  }

  loginBtn.addEventListener('click', function(){
    loginError.textContent = '';
    var u = usernameInput.value.trim();
    var p = passwordInput.value;
    if (!u || !p) { loginError.textContent = 'Username and password required'; return; }
    withSpinner(loginBtn, 'Signing in...', function(){
      return api('login', { username: u, password: p }).then(function(r){
        if (r.success) {
          creds = { username: u, password: p };
          localStorage.setItem('bp_admin_creds', JSON.stringify(creds));
          showAdmin();
        } else {
          loginError.textContent = r.error || 'Invalid credentials';
        }
      }).catch(function(){
        loginError.textContent = 'Connection error';
      });
    });
  });

  passwordInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') loginBtn.click(); });

  logoutBtn.addEventListener('click', function(){
    localStorage.removeItem('bp_admin_creds');
    creds = null;
    location.reload();
  });

  addBtn.addEventListener('click', function(){
    var email = newEmailInput.value.trim();
    if (!email) return;
    withSpinner(addBtn, 'Adding...', function(){
      return api('add_subscriber', { email: email }).then(function(r){
        if (r.success) {
          newEmailInput.value = '';
          showToast('Subscriber added');
          loadSubscribers();
        } else {
          showToast(r.error || 'Add failed');
        }
      }).catch(function(){ showToast('Add failed'); });
    });
  });

  newEmailInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') addBtn.click(); });

  prevBtn.addEventListener('click', function(){
    if (currentPage > 1) {
      currentPage--;
      loadSubscribers();
    }
  });
  nextBtn.addEventListener('click', function(){
    currentPage++;
    loadSubscribers();
  });

  function runSearch() {
    var val = searchInput.value.trim();
    if (val === searchTerm) return;
    searchTerm = val;
    currentPage = 1;
    loadSubscribers();
  }
  searchInput.addEventListener('input', function(){
    if (searchInput.value.trim()) searchClearBtn.classList.remove('hidden');
    else searchClearBtn.classList.add('hidden');
  });
  searchInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter') { e.preventDefault(); runSearch(); }
  });
  searchInput.addEventListener('blur', function(){
    runSearch();
  });
  searchClearBtn.addEventListener('click', function(){
    searchInput.value = '';
    searchClearBtn.classList.add('hidden');
    if (searchTerm) {
      searchTerm = '';
      currentPage = 1;
      loadSubscribers();
    }
    searchInput.focus();
  });

  csvInput.addEventListener('change', function(e){
    var file = e.target.files[0];
    if (!file) return;
    Papa.parse(file, {
      complete: function(results){
        var rows = results.data;
        var emails = [];
        rows.forEach(function(row){
          row.forEach(function(cell){
            var c = String(cell || '').trim();
            if (c && c.indexOf('@') > 0) emails.push(c);
          });
        });
        if (emails.length === 0) { showToast('No emails found in file'); return; }
        showToast('Importing ' + emails.length + ' emails...');
        api('import_csv', { emails: emails }).then(function(r){
          if (r.success) {
            showToast('Imported ' + r.imported + ', skipped ' + r.skipped);
            loadSubscribers();
          } else { showToast(r.error || 'Import failed'); }
        });
        csvInput.value = '';
      }
    });
  });

  sendBtn.addEventListener('click', function(){
    var subject = subjectInput.value.trim();
    var html = quill.root.innerHTML;
    if (!subject) { showToast('Subject required'); return; }
    if (!quill.getText().trim()) { showToast('Body required'); return; }
    if (!confirm('Send this newsletter to all subscribers?')) return;
    sendStatus.textContent = '';
    var pollInterval = setInterval(function(){
      api('send_status').then(function(r){
        if (r.success && r.total > 0) {
          sendStatus.textContent = 'Sent ' + r.sent + ' of ' + r.total;
        }
      });
    }, 1500);
    withSpinner(sendBtn, 'Sending...', function(){
      return api('send_newsletter', { subject: subject, html: html }).then(function(r){
        clearInterval(pollInterval);
        if (r.success) {
          sendStatus.textContent = 'Sent ' + r.sent + ' of ' + r.total + (r.failed ? ', failed ' + r.failed : '');
          showToast('Newsletter sent');
          subjectInput.value = '';
          quill.setText('');
        } else {
          sendStatus.textContent = '';
          showToast(r.error || 'Send failed');
        }
      }).catch(function(){
        clearInterval(pollInterval);
        showToast('Send failed');
      });
    });
  });

  var saved = localStorage.getItem('bp_admin_creds');
  if (saved) {
    try {
      creds = JSON.parse(saved);
      showAdmin();
    } catch (err) {
      creds = null;
      localStorage.removeItem('bp_admin_creds');
      showLogin();
    }
  }
})();
</script>

</body>
</html>
